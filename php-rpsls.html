<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGI Version</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Rock, Paper, Scissors, Lizard, Spock</h1>
    <form id="rpslsForm" action="rpsls.php" method="POST" onsubmit="return validateForm()">
        <div class="active" id="name">
            <label for="nameinput">Enter your name:</label>
            <input type="text" id="nameinput" name="username" required>
            <br>
            <button id="next" type="button" onClick="validateName()">Enter</button>
        </div>
        <div id="characters" class="inactive">
            <label for="char-selection">Choose your character:</label>
            <select name="charChoice" id="char-selection" required>
                <option value="" selected disabled></option>
                <option value="Amy">Amy</option>
                <option value="Bernadette">Bernadette</option>
                <option value="Howard">Howard</option>
                <option value="Leonard">Leonard</option>
                <option value="Penny">Penny</option>
                <option value="Raj">Raj</option>
                <option value="Sheldon">Sheldon</option>
                <option value="Stuart">Stuart</option>
            </select>
            <br>
            <button type="button" onClick="charSelect()">Next</button>
        </div>
        <div id="game" class="inactive">
            <h3>Choose your Move:</h3>
            <input type="radio" id="rock" name="choice" value="1">
            <label for="rock">Rock</label><br>
            <input type="radio" id="paper" name="choice" value="2">
            <label for="paper">Paper</label><br>
            <input type="radio" id="scissors" name="choice" value="3">
            <label for="scissors">Scissors</label><br>
            <input type="radio" id="lizard" name="choice" value="4">
            <label for="lizard">Lizard</label><br>
            <input type="radio" id="spock" name="choice" value="5">
            <label for="spock">Spock</label><br>
            <br>
        </div>
        <div id="errorMessage"></div>
        <button id="last" type="submit" class="inactive">Lock in</button>
    </form>
</body>
</html>
